services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # persists downloaded models
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    entrypoint: >
      sh -c "sleep 5 && ollama pull llama3:8b"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"   # run once then exit

volumes:
  ollama_data: